<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #FAFAF8;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
</head>
<body class="font-body">
<!-- Minimalist Status Badge Display Container -->
<div class="flex flex-row space-x-4 items-center">
<!-- Variant 1: Open -->
<div class="inline-flex items-center justify-center px-[8px] py-[4px] bg-[#D6EBE0] rounded-none">
<span class="text-[11px] font-medium leading-none tracking-[0.08em] text-[#2D6A4F] uppercase">
                Open
            </span>
</div>
<!-- Variant 2: Closing Soon -->
<div class="inline-flex items-center justify-center px-[8px] py-[4px] bg-[#FDF3DC] rounded-none">
<span class="text-[11px] font-medium leading-none tracking-[0.08em] text-[#B5770D] uppercase">
                Closing Soon
            </span>
</div>
<!-- Variant 3: Closed -->
<div class="inline-flex items-center justify-center px-[8px] py-[4px] bg-[#E8E8E4] rounded-none">
<span class="text-[11px] font-medium leading-none tracking-[0.08em] text-[#ABABAB] uppercase">
                Closed
            </span>
</div>
</div>
</body></html>
