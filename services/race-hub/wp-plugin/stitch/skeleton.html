<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f9f9f7",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c6c6c6",
                        "outline": "#777777",
                        "primary": "#000000",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                },
            },
        }
    </script>
<style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton-shimmer {
            background: linear-gradient(90deg, #eeeeee 25%, #f5f5f5 50%, #eeeeee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
    </style>
</head>
<body class="bg-[#FAFAF8] min-h-screen flex items-center justify-center p-8 font-body">
<!-- Loading Skeleton Card Component -->
<div class="w-full max-w-[400px] bg-surface-container-lowest border border-[#c6c6c6] flex flex-col">
<!-- Image Placeholder -->
<div class="relative w-full aspect-video overflow-hidden">
<div class="w-full h-full skeleton-shimmer"></div>
</div>
<!-- Content Section -->
<div class="p-6 flex flex-col space-y-5">
<!-- Race Name -->
<div class="space-y-2">
<div class="h-6 w-3/4 skeleton-shimmer"></div>
<div class="h-6 w-1/2 skeleton-shimmer"></div>
</div>
<!-- Date/Location -->
<div class="space-y-3 pt-2">
<div class="h-3 w-1/3 skeleton-shimmer"></div>
</div>
<!-- Badge -->
<div class="pt-4">
<div class="h-6 w-24 skeleton-shimmer"></div>
</div>
</div>
<div class="h-[1px] w-full bg-[#c6c6c6] opacity-30"></div>
</div>
</body></html>
